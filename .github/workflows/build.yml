name: Build Europa1400 Network Stability Plugin
on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Zig
        env:
          ZIG_VERSION: 0.16.0
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          mkdir -p "$HOME/.zig"
          tar -xJf /tmp/zig.tar.xz -C "$HOME/.zig" --strip-components=1
          echo "$HOME/.zig" >> "$GITHUB_PATH"
          "$HOME/.zig/zig" version

      - name: Build asi
        run: |
          make clean
          make

      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine wine32 xvfb

      - name: Run integration tests
        env:
          WINEDEBUG: '-all'
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1024x768x16 &
          make test

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: bin/networkfix.asi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: Latest Build
          files: bin/networkfix.asi
